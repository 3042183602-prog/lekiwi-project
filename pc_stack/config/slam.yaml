slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # ── Frames ─────────────────────────────────────────────────
    map_frame: map
    odom_frame: odom
    base_frame: base_link

    # TF tolerance — 放宽到 0.2s 兼容两机时钟微小偏差
    transform_tolerance: 0.2

    # ── Laser range ────────────────────────────────────────────
    max_laser_range: 8.0
    min_laser_range: 0.3
    sensor_max_range: 8.0

    # ── Map ────────────────────────────────────────────────────
    resolution: 0.05
    map_update_rate: 2.0
    map_save_period: 0.0   # auto-save disabled, use CLI

    # ── Scan matching ──────────────────────────────────────────
    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.2
    scan_matching_angular_search_window: 0.5
    scan_matching_linear_search_window: 0.2
    correlation_search_space_smear_deviation: 0.05

    # ── Ceres scan matching ────────────────────────────────────
    ceres_linear_a: 0.5
    ceres_linear_b: 0.5
    ceres_angular_a: 0.5
    ceres_angular_b: 0.5
    ceres_transform_loss: 0.3
    ceres_velocity_loss: 0.1
    ceres_scan_kernel_sigma: 0.5

    # ── Buffer / loop closure ──────────────────────────────────
    scan_buffer_size: 20
    scan_buffer_maximum_scan_distance: 10.0
    fine_search_angular_distance: 0.025
    coarse_search_angular_distance: 0.5
    link_match_min_response: 0.3

    # ── Laser topic ────────────────────────────────────────────
    laser_topic: /scan
